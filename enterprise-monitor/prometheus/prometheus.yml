# ── Prometheus Configuration ──────────────────────────────────────────────────
# Enterprise Network Monitoring System

global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

  external_labels:
    monitor: 'netwatch-enterprise'
    environment: 'production'

# ── Alertmanager config ───────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Rule files ────────────────────────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ── Scrape configs ─────────────────────────────────────────────────────────────
scrape_configs:

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # Scrape the Flask monitoring app
  - job_name: 'netwatch-app'
    static_configs:
      - targets: ['app:5000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Node Exporter for host-level metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # Alertmanager self-monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    scrape_interval: 30s
