# ── Nginx Reverse Proxy — NetWatch Enterprise ─────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Upstream definitions
    upstream netwatch_app {
        server app:5000;
        keepalive 16;
    }
    upstream grafana {
        server grafana:3000;
        keepalive 8;
    }

    # ── Main dashboard (port 80) ───────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"  always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "no-referrer-when-downgrade" always;

        # NetWatch dashboard + API
        location / {
            proxy_pass         http://netwatch_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # Rate-limit API endpoints
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://netwatch_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Prometheus metrics (restrict in production)
        location /metrics {
            # allow 10.0.0.0/8;   # Only internal network
            # deny  all;
            proxy_pass         http://netwatch_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Connection        "";
        }

        # Grafana — served at /grafana
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            rewrite ^/grafana(/.*)$ $1 break;
        }

        # Health check endpoint (no logging)
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
